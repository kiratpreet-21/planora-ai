<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Planora AI Study Planner</title>
  <meta name="description" content="Create your Planora account and start planning smarter." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/features.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/depth.css" />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <button class="auth-theme-btn" id="themeBtn" onclick="toggleThemePage()" aria-label="Toggle theme"><i data-lucide="sun" class="icon-inline"></i></button>

  <div class="auth-page">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>

    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="auth-brand-name">Planora</span>
      </div>
      <p class="auth-tagline">Start your study journey today <i data-lucide="rocket" class="icon-inline"></i></p>

      <h2 class="auth-title">Create Account</h2>

      <form id="signupForm" novalidate>
        <!-- Name -->
        <div class="form-group">
          <label class="form-label" for="signupName">Display Name</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupName" class="form-input" placeholder="e.g. Alex Johnson" autocomplete="name" required maxlength="40" />
          </div>
          <div class="form-error" id="nameErr"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="signupPw">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPw" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password" required />
            <button type="button" class="eye-btn" id="eyePw" onclick="togglePw('signupPw','eyePw')" aria-label="Show">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="pwErr"></div>
        </div>

        <!-- Confirm -->
        <div class="form-group">
          <label class="form-label" for="confirmPw">Confirm Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            <input type="password" id="confirmPw" class="form-input" placeholder="Repeat password" autocomplete="new-password" required />
          </div>
          <div class="form-error" id="confirmErr"></div>
        </div>

        <div class="form-error" id="formErr"></div>

        <button type="submit" class="btn btn-primary btn-full auth-submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create Account <i data-lucide="rocket" class="icon-inline"></i>
        </button>
      </form>

      <p class="auth-link">Already have an account? <a href="login.html">Login →</a></p>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/depth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script>
    requireGuest();
    initTheme();
    applyThemeIcon();

    function togglePw(inputId, btnId) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      document.getElementById(btnId).style.opacity = inp.type === 'text' ? '0.5' : '1';
    }

    document.getElementById('signupForm').addEventListener('submit', e => {
      e.preventDefault();
      clearErrors();

      const name    = document.getElementById('signupName').value.trim();
      const pw      = document.getElementById('signupPw').value;
      const confirm = document.getElementById('confirmPw').value;
      let valid = true;

      if (!name || name.length < 2) { showErr('nameErr', 'Name must be at least 2 characters.'); valid = false; }
      if (!pw || pw.length < 6)     { showErr('pwErr', 'Password must be at least 6 characters.'); valid = false; }
      if (pw !== confirm) { showErr('confirmErr', 'Passwords do not match.'); valid = false; }
      if (!valid) return;

      // Register the account (persists)
      registerUser(name, pw);
      // Set the active session
      setAuth(name);
      
      saveUser({ name });
      showToast('🎉 Account created! Taking you to the dashboard…', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    });

    function clearErrors() {
      ['nameErr','pwErr','confirmErr','formErr'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
      });
    }
    function showErr(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }
  </script>
</body>
</html>
